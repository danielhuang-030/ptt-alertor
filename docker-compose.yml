services:
  ptt-alertor:
    build: .
    ports:
      - "${PTT_ALERTOR_HOST_PORT:-9090}:9090"  # PTT Alertor Web жњЌе‹™
      - "${GOPS_HOST_PORT:-6060}:6060"        # gops agent з›ЈжЋ§жњЌе‹™
    restart: always
    environment:
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PW=${AUTH_PW:-admin_password}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET:-}
      - LINE_CHANNEL_ACCESSTOKEN=${LINE_CHANNEL_ACCESSTOKEN:-}
      - MESSENGER_ACCESSTOKEN=${MESSENGER_ACCESSTOKEN:-}
      - MESSENGER_VERIFYTOKEN=${MESSENGER_VERIFYTOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID:-}
      - REDIS_ENDPOINT=pttalertor-redis
      - REDIS_PORT=6379
      - APP_HOST=http://localhost:9090
      - BOARD_DRIVER_TYPE=${BOARD_DRIVER_TYPE:-}
      - BOARD_FILE_STORAGE_PATH=${BOARD_FILE_STORAGE_PATH:-}
    depends_on:
      - redis
    networks:
      - pttalertor-network

  redis:
    image: redis:alpine
    container_name: pttalertor-redis
    restart: always
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data # жЊЃд№…еЊ– Redis иі‡ж–™
    networks:
      - pttalertor-network

volumes:
  redis-data: # е®љзѕ© Redis иі‡ж–™еЌ·

networks:
  pttalertor-network: # и‡ЄиЁ‚ж©‹жЋҐз¶Іи·Ї
    driver: bridge
